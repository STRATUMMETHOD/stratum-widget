<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surface Pattern</title>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="session-panel">
        <h2>Session Prompt</h2>
        <div class="prompt-wrap">
            <label for="prompt">Instructions:</label>
            <input type="text" id="prompt" placeholder="Your prompt here">
            <button onclick="copyPrompt()">Copy Prompt</button>
        </div>
        <div id="session-prompt" style="display:none;"></div><!-- Removed inline script and duplicated blocks -->
    </div>
    
    <script src="script.js"></script>
</body>
</html>
